<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Stopwatch</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>STOPWATCH</h1>

        <div class="time" id="display">
            00 : 00 : 00
        </div>

        <div class="buttons">

            <button onclick="startTimer()" class="start">
                Start
            </button>

            <button onclick="pauseTimer()" class="pause">
                Pause
            </button>

            <button onclick="resetTimer()" class="reset">
                Reset
            </button>

            <button onclick="lapTime()" class="lap">
                Lap
            </button>

        </div>

        <div class="laps">
            <h2>Lap Times</h2>

            <ul id="lapsList"></ul>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
